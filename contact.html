<!DOCTYPE html>
<html lang="fr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - CloudNow</title>
    <link rel="stylesheet" href="style.css">
    <link rel="icon"
        href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>☁️</text></svg>">
</head>

<body>
    <div class="grid-overlay"></div>
    <div class="bg-gradient-blob blob-1"></div>
    <div class="bg-gradient-blob blob-2"></div>

    <nav>
        <div class="nav-glass">
            <a href="index.html" class="logo">
                <span style="font-size: 1.2rem;">☁️</span> CloudNow
            </a>
            <div class="nav-links">
                <a href="features.html">Fonctionnalités</a>
                <a href="pricing.html">Tarifs</a>
                <a href="contact.html" style="color: white;">Contact</a>
            </div>
            <a href="https://panel.cloudnow.fr" class="nav-cta">Connexion</a>
        </div>
    </nav>

    <header class="page-header">
        <h1>Lançons votre <span class="text-gradient">projet.</span></h1>
        <p>Remplissez ce formulaire pour demander l'activation de votre service.</p>
    </header>

    <section style="padding: 0 20px; padding-bottom: 60px;">
        <div class="contact-form-container">
            <form>
                <div class="form-group">
                    <label for="name">Nom Complet / Pseudo</label>
                    <input type="text" id="name" class="form-control" placeholder="John Doe" required>
                </div>

                <div class="form-group">
                    <label for="email">Adresse Email</label>
                    <input type="email" id="email" class="form-control" placeholder="john@example.com" required>
                </div>

                <div class="form-group">
                    <label for="domain">Sous-domaine souhaité</label>
                    <div style="display: flex; align-items: center; gap: 0.5rem;">
                        <input type="text" id="domain" class="form-control" placeholder="mon-service" required>
                        <span style="color: var(--text-muted); font-weight: 500;">.cloudnow.fr</span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="service-type">Type de Service</label>
                    <select id="service-type" class="form-control">
                        <option value="web">Site Web (HTML/PHP/Node)</option>
                        <option value="app">Application (Docker, Portainer...)</option>
                        <option value="media">Média (Plex, Jellyfin)</option>
                        <option value="game">Serveur de Jeu</option>
                        <option value="other">Autre</option>
                    </select>
                </div>

                <div class="form-group">
                    <label for="message">Détails techniques (Port, IP locale...)</label>
                    <textarea id="message" class="form-control"
                        placeholder="Mon service tourne sur le port 8080 de mon Raspberry Pi..." required></textarea>
                </div>

                <button type="submit" class="btn btn-primary" style="width: 100%; justify-content: center;">Envoyer la
                    demande</button>
            </form>
        </div>
    </section>

    <footer>
        <div class="footer-logo">
            <span style="font-size: 1.2rem;">☁️</span>
            <span style="font-weight: 700; color: white;">CloudNow</span>
        </div>
        <div class="footer-links">
            <a href="features.html">Fonctionnalités</a>
            <a href="contact.html">Contact</a>
            <a href="#">Status</a>
        </div>
        <div style="margin-top: 2rem; font-size: 0.8rem; opacity: 0.4;">
            &copy; 2024 CloudNow. Tous droits réservés.
        </div>
    </footer>
    <script src="script.js"></script>
</body>

</html>
